<HEAD><TITLE>医療症状</TITLE></HEAD>
<BODY>
<H1>医療症状</H1>
<P><STRONG>準シリカトニア</STRONG> – 通常の準石英代謝状態。</P>
<P><STRONG>準シリカネプラシア</STRONG> – 受容体欠損または代謝機構不全。</P>
<P><STRONG>準シリカディスリア</STRONG> – 不安定または不均一な代謝。</P>
<P><STRONG>準シリカトロピズム</STRONG> – 受動吸収が高効率化した状態。</P>
<P><STRONG>準シリカカルシネルギー</STRONG> – 結晶に対する過敏免疫反応。</P>
<P><STRONG>準シリカ尿管炎</STRONG> – 内耳腺の自己免疫攻撃。</P>
<P><STRONG>QARS</STRONG> – 結晶全体を敵とみなす免疫症候群。</P>
<P><STRONG>QDLS</STRONG> – 皮膚に結晶が蓄積し痛みを生じる症状。</P>
</BODY>
