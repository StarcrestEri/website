<H1>ノイオ帝国</H1>
<P>1 NE にノイオが権力を握り、ネウミン帝国を崩壊させてノイオ帝国を建国。嫌悪キャンペーンで望まざる者を抑圧し、追放者はヒマバットに送られシヴァ建造のための労働を強いられた。</P>
<P>ハヴォックなどの司令官が秩序を維持。帝国技術は機動型バイオスーツや機械ワイバーンを含む。</P>
<P>帝国の専制はスーリヤ星系中に及んだが、いつか崩壊するだろう。</P>
